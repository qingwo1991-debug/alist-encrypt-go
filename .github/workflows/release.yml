name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: Release version (optional, e.g. v1.2.3)
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  GO_VERSION: '1.25.0'

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: Run unit tests
        run: |
          go test ./...
          go test -tags noembedwebui ./...

  version:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_name: ${{ steps.version.outputs.version_name }}
      build_number: ${{ steps.version.outputs.build_number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve version
        id: version
        run: |
          export TZ=Asia/Shanghai

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="v$(date +%Y.%m.%d).${GITHUB_RUN_NUMBER}"
          fi

          VERSION_NAME="${VERSION#v}"
          BUILD_NUMBER=$(date +%y%m%d%H)

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

  build-docker:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-binaries:
    runs-on: ubuntu-latest
    needs: [test, version]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            name: alist-encrypt-go-linux-amd64
          - goos: linux
            goarch: arm64
            name: alist-encrypt-go-linux-arm64
          - goos: linux
            goarch: arm
            goarm: '7'
            name: alist-encrypt-go-linux-armv7
          - goos: windows
            goarch: amd64
            name: alist-encrypt-go-windows-amd64.exe
          - goos: windows
            goarch: arm64
            name: alist-encrypt-go-windows-arm64.exe
          - goos: darwin
            goarch: amd64
            name: alist-encrypt-go-darwin-amd64
          - goos: darwin
            goarch: arm64
            name: alist-encrypt-go-darwin-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: Build binary
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          go build -ldflags="-w -s" -o "${{ matrix.name }}" ./cmd/server

      - name: Upload binary artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}
          if-no-files-found: error

  build-mobile-aar:
    runs-on: ubuntu-latest
    needs: [test, version]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            gomobile_target: arm64-v8a
          - abi: armeabi-v7a
            gomobile_target: armeabi-v7a
          - abi: x86_64
            gomobile_target: x86_64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: mobile/openlist-lib/go.sum

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Initialize mobile Go binding
        working-directory: mobile/openlist-lib/scripts
        run: |
          bash ./init_openlist.sh
          bash ./init_web.sh
          bash ./init_gomobile.sh
          bash ./gobind.sh release ${{ matrix.gomobile_target }}

      - name: Upload Android library artifacts
        uses: actions/upload-artifact@v6
        with:
          name: mobile-aar-${{ matrix.abi }}
          path: mobile/android/app/libs/*
          if-no-files-found: error

  build-mobile:
    runs-on: ubuntu-latest
    needs: [test, version, build-mobile-aar]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            target_platform: android-arm64
          - abi: armeabi-v7a
            target_platform: android-arm
          - abi: x86_64
            target_platform: android-x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download Android library artifacts
        uses: actions/download-artifact@v7
        with:
          name: mobile-aar-${{ matrix.abi }}
          path: mobile/android/app/libs

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          cache: true

      - name: Build APK
        working-directory: mobile
        env:
          ABI_FILTERS: ${{ matrix.abi }}
        run: |
          flutter pub get
          flutter build apk --release --split-per-abi \
            --target-platform=${{ matrix.target_platform }} \
            --build-name=${{ needs.version.outputs.version_name }} \
            --build-number=${{ needs.version.outputs.build_number }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v6
        with:
          name: mobile-apk-${{ matrix.abi }}
          path: mobile/build/app/outputs/flutter-apk/*${{ matrix.abi }}*.apk
          if-no-files-found: warn

  release-core:
    runs-on: ubuntu-latest
    needs: [version, build-binaries]
    if: github.event_name != 'pull_request'
    permissions:
      contents: write

    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-artifacts

      - name: List release artifacts
        run: find release-artifacts -type f | sort

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.version.outputs.version }}
          RELEASE_NAME: Alist-Encrypt-Go ${{ needs.version.outputs.version }}
          TARGET_COMMITISH: ${{ github.sha }}
        run: |
          set -euo pipefail

          mapfile -t release_files < <(find release-artifacts -type f \( -name "*.exe" -o -name "alist-encrypt-go-*" \) | sort)
          if [ "${#release_files[@]}" -eq 0 ]; then
            echo "No release files found"
            exit 1
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${release_files[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${release_files[@]}" \
              --title "$RELEASE_NAME" \
              --target "$TARGET_COMMITISH" \
              --generate-notes=false \
              --notes ""
          fi

  release-mobile:
    runs-on: ubuntu-latest
    needs: [version, build-mobile, release-core]
    if: github.event_name != 'pull_request'
    permissions:
      contents: write

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v7
        with:
          pattern: mobile-apk-*
          path: release-mobile
          merge-multiple: true

      - name: Create or update GitHub Release with APK
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.version.outputs.version }}
          RELEASE_NAME: OpenList Encrypt ${{ needs.version.outputs.version }}
          TARGET_COMMITISH: ${{ github.sha }}
        run: |
          set -euo pipefail

          mapfile -t apk_files < <(find release-mobile -type f -name "*.apk" | sort)
          if [ "${#apk_files[@]}" -eq 0 ]; then
            echo "No APK files found"
            exit 1
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${apk_files[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${apk_files[@]}" \
              --title "$RELEASE_NAME" \
              --target "$TARGET_COMMITISH" \
              --generate-notes=false \
              --notes ""
          fi
