services:
  alist-encrypt:
    image: ghcr.io/qingwo1991-debug/alist-encrypt-go:latest
    container_name: alist-encrypt-go
    restart: unless-stopped
    ports:
      - "5344:5344"
      # Uncomment for HTTPS
      # - "5345:5345"
    volumes:
      # IMPORTANT: These volumes persist your configuration
      # conf/config.json - stores Alist server settings, encryption passwords, etc.
      # data/ - stores user database (login credentials)
      - ./conf:/app/conf
      - ./data:/app/data
    environment:
      # Override config via environment variables (optional)
      # ALIST_ENCRYPT_SCHEME_HTTP_PORT: 5344
      # ALIST_ENCRYPT_SCHEME_ENABLE_H2C: "false"
      # ALIST_ENCRYPT_ALIST_HOST: alist
      # ALIST_ENCRYPT_ALIST_PORT: 5244
      # Enable MySQL only when BOTH variables are set:
      # DB_TYPE: mysql
      # DB_DSN: user:password@tcp(mysql:3306)/alist_encrypt?charset=utf8mb4&parseTime=True&loc=Local
      - TZ=Asia/Shanghai
    networks:
      - alist-network
    depends_on:
      alist:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5344/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Optional: Alist service
  alist:
    image: xhofe/alist:latest
    container_name: alist
    restart: unless-stopped
    ports:
      - "5244:5244"
    volumes:
      - ./alist-data:/opt/alist/data
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Shanghai
    networks:
      - alist-network

  # Optional: MySQL metadata store. Enable with: docker compose --profile mysql up -d
  mysql:
    image: mysql:8.4
    container_name: alist-encrypt-mysql
    restart: unless-stopped
    profiles:
      - mysql
    environment:
      - MYSQL_DATABASE=alist_encrypt
      - MYSQL_USER=alist_encrypt
      - MYSQL_PASSWORD=change-me
      - MYSQL_ROOT_PASSWORD=change-me-root
      - TZ=Asia/Shanghai
    volumes:
      - ./mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "alist_encrypt", "-pchange-me"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - alist-network

networks:
  alist-network:
    driver: bridge
