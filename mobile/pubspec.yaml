name: openlist_mobile
description: Android OpenList client with encryption proxy support
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.2
  get: ^4.6.6
  flutter_inappwebview: ^6.0.0
  android_intent_plus: ^5.3.0
  flutter_svg: ^2.0.9
  permission_handler: ^12.0.1
  lazy_load_indexed_stack: ^1.1.0
  animations: ^2.0.11
  file_picker: ^8.0.0
  fade_indexed_stack: ^0.2.2
  dio: ^5.4.0
  path_provider: ^2.1.2
  open_filex: ^4.3.4
  flutter_local_notifications: ^19.3.1
  share_plus: ^10.0.0
  open_file_manager: ^1.0.0
  shared_preferences: ^2.3.2
  flutter_highlight: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  intl_utils: ^2.8.7
  pigeon: ^16.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/openlist.svg

flutter_intl:
  enabled: true
  main_locale: zh
